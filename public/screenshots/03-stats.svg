      <text x="20" y="40" font-family="ui-sans-serif" font-size="11" fill="#64748b" letter-spacing="2">INGRESOS</text>
      <text x="20" y="76" font-family="ui-sans-serif" font-size="28" font-weight="700" fill="#1A365D">$ 87,400</text>
    </g>
