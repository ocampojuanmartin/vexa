      <stop offset="0" stop-color="#F1EEF8"/>
      <stop offset="0.5" stop-color="#EBE8F3"/>
      <stop offset="1" stop-color="#EDE4EE"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1A365D"/>
      <stop offset="1" stop-color="#3182CE"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg3)"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="1000" fill="white" fill-opacity="0.4"/>
  <text x="40" y="60" font-family="ui-sans-serif" font-size="22" font-weight="600" fill="#1A365D" letter-spacing="3">vexa</text>
  <rect x="20" y="360" width="200" height="36" rx="8" fill="white" fill-opacity="0.6"/>
  <rect x="40" y="200" width="160" height="14" rx="3" fill="#cbd5e1" opacity="0.5"/>
  <rect x="40" y="240" width="120" height="14" rx="3" fill="#cbd5e1" opacity="0.5"/>
  <rect x="40" y="280" width="140" height="14" rx="3" fill="#cbd5e1" opacity="0.5"/>
  <!-- Main -->
