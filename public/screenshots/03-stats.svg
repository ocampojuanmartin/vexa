      <text x="20" y="76" font-family="ui-sans-serif" font-size="28" font-weight="700" fill="#1A365D">487h</text>
    </g>
    <g transform="translate(310, 0)">
      <rect width="290" height="100" rx="12" fill="white" fill-opacity="0.7"/>
      <text x="20" y="40" font-family="ui-sans-serif" font-size="11" fill="#64748b" letter-spacing="2">FACTURADAS</text>
      <text x="20" y="76" font-family="ui-sans-serif" font-size="28" font-weight="700" fill="#1A365D">412h</text>
    </g>
    <g transform="translate(620, 0)">
